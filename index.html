<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Конвертер единиц</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:          var(--tg-theme-bg-color,          #0f0f13);
  --bg2:         var(--tg-theme-secondary-bg-color, #1a1a22);
  --text:        var(--tg-theme-text-color,         #f0f0f4);
  --hint:        var(--tg-theme-hint-color,         #7b7b8f);
  --accent:      var(--tg-theme-button-color,       #5b6fff);
  --accent-text: var(--tg-theme-button-text-color,  #ffffff);
  --border:      rgba(255,255,255,0.08); /* переопределяется JS в applyTheme() */
  --card:        rgba(255,255,255,0.04);
  --num-bg:      rgba(255,255,255,0.06);
  --num-active:  rgba(91,111,255,0.22);
  --radius:      16px;
  --radius-sm:   10px;
  --font:        'Onest', system-ui, sans-serif;
  --mono:        'JetBrains Mono', monospace;
  --tr:          0.15s cubic-bezier(0.4,0,0.2,1);
}

/* Светлая тема */
body.theme-light {
  --bg:     #f2f2f7;
  --bg2:    #ffffff;
  --text:   #1c1c1e;
  --hint:   #8e8e93;
  /* --border задаётся через JS на основе темы Telegram */
  --card:   rgba(0,0,0,0.03);
  --num-bg: rgba(0,0,0,0.05);
  --num-active: rgba(91,111,255,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  display: flex; flex-direction: column;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 15px;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  padding-top: env(safe-area-inset-top,0);
  padding-bottom: env(safe-area-inset-bottom,0);
  transition: background 0.2s, color 0.2s;
}

/* ── Шапка ──────────────────────────────────────────── */
.header {
  padding: 14px 16px 0;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.header-icon {
  width: 36px; height: 36px; background: var(--accent);
  border-radius: 10px; display: grid; place-items: center;
  font-size: 18px; flex-shrink: 0;
  box-shadow: 0 3px 12px rgba(91,111,255,0.4);
}
.header-title { font-size: 16px; font-weight: 700; flex: 1; }
.header-sub   { font-size: 11px; color: var(--hint); }

/* Кнопки настроек в шапке */
.header-controls { display: flex; gap: 6px; align-items: center; }
.ctrl-btn {
  height: 30px; padding: 0 10px;
  border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card); color: var(--hint);
  font-family: var(--font); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all var(--tr);
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.ctrl-btn:active { border-color: var(--accent); color: var(--accent); }
.ctrl-btn.active-setting { border-color: var(--accent); color: var(--accent); background: rgba(91,111,255,0.10); }

/* ── Табы ───────────────────────────────────────────── */
.tabs {
  display: flex; gap: 6px;
  padding: 10px 16px 0;
  overflow-x: auto; scrollbar-width: none; flex-shrink: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  padding: 7px 13px; border-radius: 100px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--hint); font-family: var(--font); font-size: 12.5px;
  font-weight: 500; cursor: pointer; transition: all var(--tr); white-space: nowrap;
}
.tab.active {
  background: var(--accent); border-color: var(--accent);
  color: var(--accent-text); box-shadow: 0 3px 12px rgba(91,111,255,0.4);
}

/* ── Скролл-зона ────────────────────────────────────── */
.scroll-area {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 12px 16px 8px; scrollbar-width: none;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Дисплей ────────────────────────────────────────── */
.display {
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
}
.display-top {
  display: flex; align-items: center; justify-content: space-between;
  min-height: 40px;
}
.display-number {
  font-family: var(--mono); font-size: 30px; font-weight: 600;
  color: var(--text); display: flex; align-items: center; gap: 8px;
  flex: 1; min-width: 0; overflow: hidden;
}
.display-number .num-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.display-number .cursor {
  display: inline-block; width: 2px; height: 30px;
  background: var(--accent); border-radius: 2px; flex-shrink: 0;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.display-placeholder { font-size: 15px; color: var(--hint); font-family: var(--font); }
.unit-badge {
  font-size: 13px; font-weight: 500; color: var(--accent);
  background: rgba(91,111,255,0.13); border-radius: 6px;
  padding: 3px 9px; flex-shrink: 0; margin-left: 8px;
}

/* ── Результат ──────────────────────────────────────── */
.result-zone { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.result-zone.visible { display: block; }
.result-main { font-family: var(--mono); font-size: 17px; font-weight: 600; color: var(--accent); line-height: 1.4; }
.result-eq { color: var(--hint); margin: 0 5px; font-weight: 400; }
.result-also { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.also-chip {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; padding: 2px 7px;
  font-family: var(--mono); font-size: 11px; color: var(--hint);
}
.result-actions { display: flex; gap: 7px; margin-top: 10px; }
.ra-btn {
  flex: 1; padding: 8px 0; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); background: var(--card);
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--hint); cursor: pointer; transition: all var(--tr);
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.ra-btn.save-btn { color: var(--accent); border-color: rgba(91,111,255,0.3); }
.ra-btn.save-btn:active { background: rgba(91,111,255,0.12); }
.ra-btn.copy-btn-inline:active { border-color: var(--accent); color: var(--accent); }

/* ── Температура ────────────────────────────────────── */
.temp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.temp-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 11px 6px; text-align: center;
}
.temp-card.highlight { border-color: var(--accent); background: rgba(91,111,255,0.10); }
.tc-label { font-size: 9px; font-weight: 600; color: var(--hint); text-transform: uppercase; margin-bottom: 4px; }
.tc-val   { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); }
.temp-card.highlight .tc-val { color: var(--accent); }

/* ── Единицы ────────────────────────────────────────── */
.units-label {
  font-size: 11px; font-weight: 600; color: var(--hint);
  letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 7px;
}
.units-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr));
  gap: 6px; margin-bottom: 4px;
}
.unit-btn {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 6px;
  cursor: pointer; transition: all var(--tr);
  text-align: center; display: flex; flex-direction: column;
  align-items: center; gap: 2px; font-family: var(--font);
}
.unit-btn.selected { background: rgba(91,111,255,0.16); border-color: var(--accent); }
.unit-btn .code { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--text); }
.unit-btn .name { font-size: 9.5px; color: var(--hint); }
.unit-btn.selected .code { color: var(--accent); }

/* Разделитель групп единиц */
.units-divider {
  grid-column: 1 / -1;
  height: 1px; background: var(--border); margin: 2px 0;
}

/* ── История ────────────────────────────────────────── */
.history-section { margin-top: 14px; }
.history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.history-label { font-size: 11px; font-weight: 600; color: var(--hint); letter-spacing: 0.5px; text-transform: uppercase; }
.history-clear { font-size: 11px; color: var(--hint); background: none; border: none; cursor: pointer; padding: 2px 0; font-family: var(--font); }
.history-clear:active { color: #ff6b6b; }
.history-list { display: flex; flex-direction: column; gap: 5px; }
.history-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 9px 12px;
  cursor: pointer; transition: all var(--tr); gap: 8px;
}
.history-item:active { border-color: var(--accent); background: rgba(91,111,255,0.08); }
.history-text { font-family: var(--mono); font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-del { font-size: 15px; color: var(--hint); background: none; border: none; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
.history-del:active { color: #ff6b6b; }
.history-empty { font-size: 12px; color: var(--hint); text-align: center; padding: 12px; font-style: italic; }

/* ── Toast ──────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: rgba(30,30,50,0.96); color: #f0f0f4;
  padding: 9px 18px; border-radius: 100px;
  font-size: 13px; font-weight: 500; border: 1px solid rgba(255,255,255,0.1);
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap; z-index: 100;
  backdrop-filter: blur(8px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Нумпад ─────────────────────────────────────────── */
.numpad { flex-shrink: 0; padding: 0 16px 12px; background: var(--bg); }
.numpad-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
.np-btn {
  background: var(--num-bg); border: none;
  border-radius: var(--radius-sm); height: 52px;
  font-family: var(--mono); font-size: 19px; font-weight: 600;
  color: var(--text); cursor: pointer;
  transition: background var(--tr), transform 0.08s;
  display: grid; place-items: center;
  -webkit-tap-highlight-color: transparent;
}
.np-btn:active { background: var(--num-active); transform: scale(0.93); }
.np-btn.np-action { background: rgba(91,111,255,0.12); color: var(--accent); font-size: 14px; font-family: var(--font); }
.np-btn.np-action:active { background: rgba(91,111,255,0.28); }
.np-btn.np-zero { grid-column: span 2; }
.np-btn.np-clear { background: rgba(255,80,80,0.10); color: #ff6b6b; font-size: 14px; font-family: var(--font); }
.np-btn.np-clear:active { background: rgba(255,80,80,0.25); }
.np-btn.np-back { color: var(--hint); }

.tab-panel { animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">⇄</div>
  <div style="flex:1">
    <div class="header-title" id="header-title">Конвертер единиц</div>
    <div class="header-sub" id="header-sub">США ↔ Россия</div>
  </div>
  <div class="header-controls">
    <button class="ctrl-btn" id="btn-lang" onclick="toggleLang()">EN</button>
    <button class="ctrl-btn" id="btn-theme" onclick="toggleTheme()">☀️</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="scroll-area" id="panel"></div>

<div class="numpad">
  <div class="numpad-grid" id="numpad-grid">
    <button class="np-btn" data-val="7">7</button>
    <button class="np-btn" data-val="8">8</button>
    <button class="np-btn" data-val="9">9</button>
    <button class="np-btn np-clear" id="np-clear">AC</button>

    <button class="np-btn" data-val="4">4</button>
    <button class="np-btn" data-val="5">5</button>
    <button class="np-btn" data-val="6">6</button>
    <button class="np-btn np-back" id="np-back">
      <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
        <path d="M10 2H24C25.1 2 26 2.9 26 4V16C26 17.1 25.1 18 24 18H10L2 10L10 2Z" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <line x1="14" y1="7" x2="21" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="21" y1="7" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="np-btn" data-val="1">1</button>
    <button class="np-btn" data-val="2">2</button>
    <button class="np-btn" data-val="3">3</button>
    <button class="np-btn np-action" id="np-neg" style="display:none">+/−</button>
    <button class="np-btn np-action" id="np-save">📌</button>

    <button class="np-btn np-zero" data-val="0">0</button>
    <button class="np-btn" data-val=".">.</button>
    <button class="np-btn np-action" id="np-copy">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="7" y="7" width="12" height="13" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M5 15H4C2.9 15 2 14.1 2 13V4C2 2.9 2.9 2 4 2H13C14.1 2 15 2.9 15 4V5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── Локализация ──────────────────────────────────────────────
let lang = 'ru';

const I18N = {
  ru: {
    appTitle:    'Конвертер единиц',
    appSub:      'США ↔ Россия',
    placeholder: 'Введите число',
    unitLabel:   'Единица измерения',
    histLabel:   'История',
    histEmpty:   'Нет сохранённых значений',
    histClear:   'Очистить',
    copy:        'Скопировать',
    save:        '📌 Сохранить',
    saved:       '📌 Сохранено',
    copied:      'Скопировано ✓',
    tabs: { distance:'📏 Расстояние', weight:'⚖️ Вес', temp:'🌡 Температура', volume:'🧴 Объём' },
  },
  en: {
    appTitle:    'Unit Converter',
    appSub:      'USA ↔ Russia',
    placeholder: 'Enter number',
    unitLabel:   'Unit',
    histLabel:   'History',
    histEmpty:   'No saved values',
    histClear:   'Clear',
    copy:        'Copy',
    save:        '📌 Save',
    saved:       '📌 Saved',
    copied:      'Copied ✓',
    tabs: { distance:'📏 Distance', weight:'⚖️ Weight', temp:'🌡 Temperature', volume:'🧴 Volume' },
  }
};
const t = () => I18N[lang];

// ── Тема ─────────────────────────────────────────────────────
let theme = 'dark';
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
}
function applyTheme() {
  const isLight = theme === 'light';
  document.body.classList.toggle('theme-light', isLight);
  document.getElementById('btn-theme').textContent = isLight ? '🌙' : '☀️';

  // Граница: на светлом фоне нужна тёмная непрозрачная обводка,
  // на тёмном — светлая полупрозрачная.
  // Берём реальный bg-цвет из Telegram если доступен, иначе смотрим на тему.
  let border;
  const tgBg = tg?.themeParams?.bg_color || null;
  if (tgBg) {
    // Парсим яркость HEX-цвета (#rrggbb)
    const hex = tgBg.replace('#','');
    const r = parseInt(hex.slice(0,2),16);
    const g = parseInt(hex.slice(2,4),16);
    const b = parseInt(hex.slice(4,6),16);
    const luminance = (0.299*r + 0.587*g + 0.114*b) / 255;
    border = luminance > 0.5
      ? 'rgba(0,0,0,0.13)'        // светлый фон — тёмная видимая граница
      : 'rgba(255,255,255,0.10)'; // тёмный фон  — светлая полупрозрачная
  } else {
    border = isLight ? 'rgba(0,0,0,0.13)' : 'rgba(255,255,255,0.10)';
  }
  document.documentElement.style.setProperty('--border', border);

  // card тоже адаптируем
  const card = isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.04)';
  document.documentElement.style.setProperty('--card', card);
  const numBg = isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.06)';
  document.documentElement.style.setProperty('--num-bg', numBg);
}

function toggleLang() {
  lang = lang === 'ru' ? 'en' : 'ru';
  document.getElementById('btn-lang').textContent = lang === 'ru' ? 'EN' : 'RU';
  document.getElementById('header-title').textContent = t().appTitle;
  document.getElementById('header-sub').textContent   = t().appSub;
  // Обновить табы
  document.querySelectorAll('.tab').forEach(tab => {
    tab.textContent = t().tabs[tab.dataset.cat] || tab.textContent;
  });
  render();
}

// ── Данные ───────────────────────────────────────────────────
// Порядок: сначала американские, потом российские
const CATS = {
  distance: {
    // us = американские, ru = российские
    units: [
      {code:'mi', label:'mi',   name:{ru:'миля',   en:'mile'},   us:true},
      {code:'ft', label:'ft',   name:{ru:'фут',    en:'foot'},   us:true},
      {code:'in', label:'in',   name:{ru:'дюйм',   en:'inch'},   us:true},
      {code:'yd', label:'yd',   name:{ru:'ярд',    en:'yard'},   us:true},
      {code:'km', label:'км',   name:{ru:'километр',en:'km'},    us:false},
      {code:'m',  label:'м',    name:{ru:'метр',   en:'meter'},  us:false},
      {code:'cm', label:'см',   name:{ru:'сантиметр',en:'cm'},   us:false},
    ],
    convert(val,from){
      const M={km:1000,m:1,cm:0.01,mi:1609.344,yd:0.9144,ft:0.3048,in:0.0254};
      const N={km:'км',m:'м',cm:'см',mi:'mi',yd:'yd',ft:'ft',in:'in'};
      const Ne={km:'km',m:'m',cm:'cm',mi:'mi',yd:'yd',ft:'ft',in:'in'};
      const base=val*M[from];
      const pairs=[['mi','km'],['ft','m'],['in','cm'],['yd','m']];
      let to=null; for(const[a,b]of pairs){if(from===a){to=b;break;}if(from===b){to=a;break;}}
      const mainVal=to?base/M[to]:null;
      const g={mi:['mi','km'],km:['mi','km'],ft:['ft','m','yd'],m:['ft','m','yd'],yd:['ft','m','yd'],in:['in','cm'],cm:['in','cm']};
      const extras=(g[from]||[]).filter(u=>u!==from&&u!==to).map(u=>({val:base/M[u],unit:lang==='en'?Ne[u]:N[u]}));
      const nn = lang==='en'?Ne:N;
      return{mainVal,mainUnit:to?nn[to]:null,fromUnit:nn[from],extras};
    }
  },
  weight: {
    units: [
      {code:'lb', label:'lb',   name:{ru:'фунт',   en:'pound'},  us:true},
      {code:'oz', label:'oz',   name:{ru:'унция',  en:'ounce'},  us:true},
      {code:'st', label:'st',   name:{ru:'стоун',  en:'stone'},  us:true},
      {code:'kg', label:'кг',   name:{ru:'килограмм',en:'kg'},   us:false},
      {code:'g',  label:'г',    name:{ru:'грамм',  en:'gram'},   us:false},
      {code:'t',  label:'т',    name:{ru:'тонна',  en:'tonne'},  us:false},
    ],
    convert(val,from){
      const G={kg:1000,g:1,t:1e6,lb:453.592,oz:28.3495,st:6350.29};
      const N={kg:'кг',g:'г',t:'т',lb:'lb',oz:'oz',st:'st'};
      const Ne={kg:'kg',g:'g',t:'t',lb:'lb',oz:'oz',st:'st'};
      const base=val*G[from];
      const pairs=[['lb','kg'],['oz','g'],['st','kg']];
      let to=null; for(const[a,b]of pairs){if(from===a){to=b;break;}if(from===b){to=a;break;}}
      const mainVal=to?base/G[to]:null;
      const g2={kg:['lb','kg','st'],lb:['lb','kg','st'],st:['lb','kg','st'],g:['oz','g'],oz:['oz','g'],t:['t','lb']};
      const nn=lang==='en'?Ne:N;
      const extras=(g2[from]||[]).filter(u=>u!==from&&u!==to).map(u=>({val:base/G[u],unit:nn[u]}));
      return{mainVal,mainUnit:to?nn[to]:null,fromUnit:nn[from],extras};
    }
  },
  temp: {
    units: [
      {code:'F', label:'°F', name:{ru:'Фаренгейт',en:'Fahrenheit'}, us:true},
      {code:'C', label:'°C', name:{ru:'Цельсий',  en:'Celsius'},    us:false},
      {code:'K', label:'K',  name:{ru:'Кельвин',  en:'Kelvin'},     us:false},
    ],
    convert(val,from){
      let C,F,K;
      if(from==='C'){C=val;F=val*9/5+32;K=val+273.15;}
      else if(from==='F'){C=(val-32)*5/9;F=val;K=C+273.15;}
      else{K=val;C=val-273.15;F=C*9/5+32;}
      return{C,F,K};
    }
  },
  volume: {
    units: [
      {code:'gal', label:'gal',  name:{ru:'галлон (US)',en:'gallon'},   us:true},
      {code:'pt',  label:'pt',   name:{ru:'пинта (US)', en:'pint'},     us:true},
      {code:'qt',  label:'qt',   name:{ru:'кварта (US)',en:'quart'},    us:true},
      {code:'floz',label:'fl oz',name:{ru:'жидк. унция',en:'fl oz'},    us:true},
      {code:'l',   label:'л',    name:{ru:'литр',       en:'liter'},    us:false},
      {code:'ml',  label:'мл',   name:{ru:'миллилитр',  en:'ml'},       us:false},
    ],
    convert(val,from){
      const ML={l:1000,ml:1,gal:3785.41,pt:473.176,qt:946.353,floz:29.5735};
      const N={l:'л',ml:'мл',gal:'gal',pt:'pt',qt:'qt',floz:'fl oz'};
      const Ne={l:'l',ml:'ml',gal:'gal',pt:'pt',qt:'qt',floz:'fl oz'};
      const base=val*ML[from];
      const pairs=[['gal','l'],['floz','ml'],['pt','l'],['qt','l']];
      let to=null; for(const[a,b]of pairs){if(from===a){to=b;break;}if(from===b){to=a;break;}}
      const mainVal=to?base/ML[to]:null;
      const big=['gal','qt','pt','l'],small=['floz','ml'];
      const group=big.includes(from)?big:small;
      const nn=lang==='en'?Ne:N;
      const extras=group.filter(u=>u!==from&&u!==to).map(u=>({val:base/ML[u],unit:nn[u]}));
      return{mainVal,mainUnit:to?nn[to]:null,fromUnit:nn[from],extras};
    }
  }
};

function fmt(v){
  if(!isFinite(v))return'—';
  if(Math.abs(v)>=10000)return v.toLocaleString('ru',{maximumFractionDigits:2});
  if(Math.abs(v)>=1)return parseFloat(v.toFixed(4)).toString();
  return parseFloat(v.toFixed(6)).toString();
}

// ── Состояние ────────────────────────────────────────────────
const DEF={distance:'mi',weight:'lb',temp:'F',volume:'gal'};
let state={cat:'distance',unit:'mi',raw:''};
let history=[];
const HISTORY_MAX=5;

// ── Сброс после действия ─────────────────────────────────────
function resetInput(){
  state.raw='';
  updateDisplay();
  updateResult();
}

// ── История ──────────────────────────────────────────────────
function currentResultText(){
  const val=parseFloat(state.raw);
  if(!state.raw||isNaN(val))return null;
  const cat=CATS[state.cat];
  if(state.cat==='temp'){
    const r=cat.convert(val,state.unit);
    return `${fmt(val)} ${cat.units.find(u=>u.code===state.unit)?.label} → ${fmt(r.C)}°C / ${fmt(r.F)}°F / ${fmt(r.K)}K`;
  }
  const r=cat.convert(val,state.unit);
  if(r.mainVal===null)return null;
  return `${fmt(val)} ${r.fromUnit} = ${fmt(r.mainVal)} ${r.mainUnit}`;
}

function saveToHistory(){
  const text=currentResultText();
  if(!text)return;
  if(history[0]===text)return;
  history=history.filter(h=>h!==text);
  history.unshift(text);
  if(history.length>HISTORY_MAX)history=history.slice(0,HISTORY_MAX);
  renderHistory();
  showToast(t().saved);
  tg?.HapticFeedback?.notificationOccurred?.('success');
  resetInput(); // сброс после сохранения
}

function deleteHistory(idx){ history.splice(idx,1); renderHistory(); }
function clearHistory(){ history=[]; renderHistory(); }

function renderHistory(){
  const sec=document.getElementById('history-section');
  if(!sec)return;
  if(history.length===0){
    sec.innerHTML=`
      <div class="history-header"><span class="history-label">${t().histLabel}</span></div>
      <div class="history-empty">${t().histEmpty}</div>`;
    return;
  }
  const items=history.map((h,i)=>`
    <div class="history-item" onclick="copyHistoryItem(${i})">
      <span class="history-text">${h}</span>
      <button class="history-del" onclick="event.stopPropagation();deleteHistory(${i})">✕</button>
    </div>`).join('');
  sec.innerHTML=`
    <div class="history-header">
      <span class="history-label">${t().histLabel} (${history.length})</span>
      <button class="history-clear" onclick="clearHistory()">${t().histClear}</button>
    </div>
    <div class="history-list">${items}</div>`;
}

function copyHistoryItem(idx){
  navigator.clipboard?.writeText(history[idx]).then(()=>showToast(t().copied));
  tg?.HapticFeedback?.impactOccurred?.('medium');
}

// ── Toast ────────────────────────────────────────────────────
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

// ── Нумпад ───────────────────────────────────────────────────
function numpadPress(key){
  tg?.HapticFeedback?.impactOccurred?.('light');
  let r=state.raw;
  if(key==='back')       r=r.slice(0,-1);
  else if(key==='clear') r='';
  else if(key==='neg')   r=r.startsWith('-')?r.slice(1):(r?'-'+r:'');
  else if(key==='.'){    if(!r.includes('.'))r+=(r===''||r==='-')?'0.':'.';}
  else{ if(r==='0')r=key; else if(r==='-0')r='-'+key; else r+=key; }
  state.raw=r;
  updateDisplay();
  updateResult();
}

function updateNegBtn(){
  const neg=document.getElementById('np-neg');
  const save=document.getElementById('np-save');
  if(!neg)return;
  if(state.cat==='temp'){ neg.style.display='grid'; save.style.display='none'; }
  else                  { neg.style.display='none';  save.style.display='grid'; }
}

// ── Дисплей ──────────────────────────────────────────────────
function updateDisplay(){
  const el=document.getElementById('display-val');
  const badge=document.getElementById('display-badge');
  if(!el)return;
  const unitObj=CATS[state.cat].units.find(u=>u.code===state.unit);
  el.innerHTML = state.raw===''
    ? `<span class="display-placeholder">${t().placeholder}</span><span class="cursor"></span>`
    : `<span class="num-text">${state.raw}</span><span class="cursor"></span>`;
  if(badge)badge.textContent=unitObj?unitObj.label:'';
}

// ── Результат ────────────────────────────────────────────────
function updateResult(){
  const res=document.getElementById('result-zone');
  if(!res)return;
  const val=parseFloat(state.raw);
  if(!state.raw||isNaN(val)){ res.classList.remove('visible'); res.innerHTML=''; return; }
  const cat=CATS[state.cat];
  if(state.cat==='temp'){
    const r=cat.convert(val,state.unit);
    const cards=['F','C','K'].map(u=>`
      <div class="temp-card ${state.unit===u?'highlight':''}">
        <div class="tc-label">${u==='C'?'°C':u==='F'?'°F':'K'}</div>
        <div class="tc-val">${fmt(r[u])}</div>
      </div>`).join('');
    res.innerHTML=`
      <div class="temp-grid">${cards}</div>
      <div class="result-actions" style="margin-top:10px">
        <button class="ra-btn copy-btn-inline" onclick="copyResultInline()">${t().copy}</button>
      </div>`;
  } else {
    const r=cat.convert(val,state.unit);
    if(r.mainVal===null){ res.classList.remove('visible'); return; }
    const extrasHTML=r.extras.length
      ?`<div class="result-also">${r.extras.map(e=>`<span class="also-chip">${fmt(e.val)} ${e.unit}</span>`).join('')}</div>`:'';
    res.innerHTML=`
      <div class="result-main">
        ${fmt(val)} ${r.fromUnit}<span class="result-eq">=</span>${fmt(r.mainVal)} ${r.mainUnit}
      </div>
      ${extrasHTML}
      <div class="result-actions">
        <button class="ra-btn copy-btn-inline" onclick="copyResultInline()">${t().copy}</button>
        <button class="ra-btn save-btn" onclick="saveToHistory()">${t().save}</button>
      </div>`;
  }
  res.classList.add('visible');
}

function copyResultInline(){
  const text=currentResultText();
  if(!text)return;
  navigator.clipboard?.writeText(text).then(()=>showToast(t().copied));
  tg?.HapticFeedback?.notificationOccurred?.('success');
  resetInput(); // сброс после копирования
}

// ── Рендер панели ────────────────────────────────────────────
function render(){
  const panel=document.getElementById('panel');
  const cat=CATS[state.cat];

  // Единицы: сначала американские, потом российские — с разделителем
  const usUnits  = cat.units.filter(u=>u.us);
  const ruUnits  = cat.units.filter(u=>!u.us);
  const makeBtn  = u => `
    <button class="unit-btn ${state.unit===u.code?'selected':''}" onclick="selectUnit('${u.code}')">
      <span class="code">${u.label}</span>
      <span class="name">${u.name[lang]}</span>
    </button>`;
  const divider  = usUnits.length&&ruUnits.length ? '<div class="units-divider"></div>' : '';
  const unitsHTML= usUnits.map(makeBtn).join('') + divider + ruUnits.map(makeBtn).join('');

  panel.innerHTML=`<div class="tab-panel">
    <div class="display">
      <div class="display-top">
        <div class="display-number" id="display-val"></div>
        <span class="unit-badge" id="display-badge"></span>
      </div>
      <div class="result-zone" id="result-zone"></div>
    </div>
    <div class="units-label">${t().unitLabel}</div>
    <div class="units-grid">${unitsHTML}</div>
    <div class="history-section" id="history-section"></div>
  </div>`;

  updateNegBtn();
  updateDisplay();
  updateResult();
  renderHistory();
}

function renderTabs(){
  const tabs=document.getElementById('tabs');
  tabs.innerHTML=Object.keys(CATS).map(cat=>`
    <button class="tab ${state.cat===cat?'active':''}" data-cat="${cat}">${t().tabs[cat]}</button>`
  ).join('');
}

function selectUnit(code){
  state.unit=code;
  document.querySelectorAll('.unit-btn').forEach(btn=>{
    const lbl=btn.querySelector('.code')?.textContent;
    const u=CATS[state.cat].units.find(u=>u.label===lbl);
    if(u)btn.classList.toggle('selected',u.code===code);
  });
  updateDisplay(); updateResult();
  tg?.HapticFeedback?.selectionChanged?.();
}

function selectCat(cat){
  state.cat=cat; state.unit=DEF[cat]; state.raw='';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===cat));
  render();
  tg?.HapticFeedback?.selectionChanged?.();
}

// ── События ───────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.tab');
  if(btn)selectCat(btn.dataset.cat);
});

document.getElementById('numpad-grid').addEventListener('click',e=>{
  const btn=e.target.closest('.np-btn');
  if(!btn)return;
  if(btn.id==='np-back')       numpadPress('back');
  else if(btn.id==='np-clear') numpadPress('clear');
  else if(btn.id==='np-neg')   numpadPress('neg');
  else if(btn.id==='np-save')  saveToHistory();
  else if(btn.id==='np-copy'){
    const text=currentResultText();
    if(text){
      navigator.clipboard?.writeText(text).then(()=>showToast(t().copied));
      tg?.HapticFeedback?.notificationOccurred?.('success');
      resetInput();
    }
  }
  else if(btn.dataset.val) numpadPress(btn.dataset.val);
});

// ── Инициализация ─────────────────────────────────────────────
// Автоопределение темы из Telegram
if (tg?.colorScheme) {
  theme = tg.colorScheme; // 'light' или 'dark'
} else {
  // Фолбэк: смотрим на системную тему браузера
  theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
}
applyTheme();
renderTabs();
render();
</script>
